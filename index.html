<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>DOOM-арена</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #menuScreen {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #gameContainer {
      display: none;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 48px;
      color: lime;
      text-shadow: 0 0 20px lime;
      margin-bottom: 30px;
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 200px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #222;
      color: #0f0;
      border: 2px solid #0f0;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      font-weight: bold;
    }

    button:hover {
      background: #0f0;
      color: #111;
      box-shadow: 0 0 20px #0f0;
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    .language-selector {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .lang-btn {
      padding: 8px 15px;
      font-size: 14px;
      background: #333;
      color: #888;
      border: 1px solid #555;
      cursor: pointer;
      transition: all 0.3s;
    }

    .lang-btn.active {
      background: #0f0;
      color: #111;
      border-color: #0f0;
      box-shadow: 0 0 10px #0f0;
    }

    .lang-btn:hover {
      background: #444;
      border-color: #0f0;
    }

    #gameInfo {
      margin: 10px;
      text-align: center;
    }

    canvas {
      border: 2px solid #555;
      background: #000;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
    }

    .back-button {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="menuScreen">
    <h1>⚡ DOOM-ARENA ⚡</h1>
    <div class="menu-buttons">
      <button onclick="startGame()">▶ ПОЧАТИ ГРУ</button>
      <button onclick="showInstructions()">ℹ ЯК ГРАТИ</button>
      <button onclick="showScores()">🏆 РЕКОРДИ</button>
    </div>

    <div class="language-selector">
      <button class="lang-btn active" onclick="setLanguage('uk')">🇺🇦 Українська</button>
      <button class="lang-btn" onclick="setLanguage('en')">🇬🇧 English</button>
    </div>

    <div id="infoScreen" style="display: none; max-width: 500px;">
      <h2 id="infoTitle"></h2>
      <p id="infoText" style="text-align: left; line-height: 1.6;"></p>
      <button class="back-button" onclick="backToMenu()">← НАЗАД</button>
    </div>
  </div>

  <div id="gameContainer">
    <div id="gameInfo">
      <div id="gameControls">Керування: WASD – рух, миша – приціл, ЛКМ – стріляти</div>
      <div id="gameTip">Виживай на арені проти демонів</div>
    </div>
    <canvas id="game" width="800" height="600"></canvas>
    <button class="back-button" onclick="backToMenu()" id="backFromGame">← МЕНЮ</button>
  </div>

  <script>
    // 🌐 МОВИ
    let currentLanguage = 'uk';

    const translations = {
      uk: {
        title: '⚡ DOOM-ARENA ⚡',
        startGame: '▶ ПОЧАТИ ГРУ',
        howToPlay: 'ℹ ЯК ГРАТИ',
        scores: '🏆 РЕКОРДИ',
        back: '← НАЗАД',
        controls: 'Керування: WASD – рух, миша – приціл, ЛКМ – стріляти',
        tip: 'Виживай на арені проти демонів',
        instructionsTitle: 'ЯК ГРАТИ',
        instructions: `КЕРУВАННЯ:
• WASD - рух героя
• МИША - приціл (герой дивиться на курсор)
• ЛКМ - стріляти

ВОРОГ:
• Червоний (обичний) - базовий враг
• Оранжевий (швидкий) - швидкий але слабкий
• Фіолетовий (танк) - повільний але міцний
• Ціан (стріляючий) - утримується на відстані
• Червоний (вибуховий) - вибухає при наближенні

ЦІЛЬ:
Виживай якомога довше! Не допусти демонам торкнутися тебе!`,
        scoresTitle: '🏆 РЕКОРДИ',
        scoresEmpty: 'Рекордів ще немає. Грай гру!',
        menu: '← МЕНЮ'
      },
      en: {
        title: '⚡ DOOM-ARENA ⚡',
        startGame: '▶ START GAME',
        howToPlay: 'ℹ HOW TO PLAY',
        scores: '🏆 HIGH SCORES',
        back: '← BACK',
        controls: 'Controls: WASD - move, mouse - aim, LMB - shoot',
        tip: 'Survive the arena against demons',
        instructionsTitle: 'HOW TO PLAY',
        instructions: `CONTROLS:
• WASD - move your character
• MOUSE - aim (character looks at cursor)
• LMB - shoot

ENEMIES:
• Red (normal) - basic enemy
• Orange (fast) - fast but weak
• Purple (tank) - slow but strong
• Cyan (shooter) - keeps distance and shoots
• Red (exploder) - explodes when near you

GOAL:
Survive as long as possible! Don't let demons touch you!`,
        scoresTitle: '🏆 HIGH SCORES',
        scoresEmpty: 'No scores yet. Play the game!',
        menu: '← MENU'
      }
    };

    function setLanguage(lang) {
      currentLanguage = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      updateMenuText();
    }

    function updateMenuText() {
      const t = translations[currentLanguage];
      document.querySelector('h1').textContent = t.title;
      document.querySelectorAll('.menu-buttons button')[0].textContent = t.startGame;
      document.querySelectorAll('.menu-buttons button')[1].textContent = t.howToPlay;
      document.querySelectorAll('.menu-buttons button')[2].textContent = t.scores;
      if (document.getElementById('gameControls')) {
        document.getElementById('gameControls').textContent = t.controls;
        document.getElementById('gameTip').textContent = t.tip;
      }
    }

    function showInstructions() {
      const t = translations[currentLanguage];
      document.getElementById('menuScreen').innerHTML = `
        <div id="infoScreen" style="display: block; max-width: 600px;">
          <h2>${t.instructionsTitle}</h2>
          <p id="infoText" style="text-align: left; line-height: 1.8; white-space: pre-wrap;">${t.instructions}</p>
          <button class="back-button" onclick="backToMenu()">← ${t.back}</button>
        </div>
      `;
    }

    function showScores() {
      const t = translations[currentLanguage];
      const scores = JSON.parse(localStorage.getItem('doomArenaScores')) || [];
      const scoresText = scores.length > 0 
        ? scores.map((s, i) => `${i + 1}. ${s.time}s - ${s.kills} kills`).join('\n')
        : t.scoresEmpty;
      
      document.getElementById('menuScreen').innerHTML = `
        <div id="infoScreen" style="display: block; max-width: 600px;">
          <h2>${t.scoresTitle}</h2>
          <p id="infoText" style="text-align: left; line-height: 1.8; white-space: pre-wrap;">${scoresText}</p>
          <button class="back-button" onclick="backToMenu()">← ${t.back}</button>
        </div>
      `;
    }

    function backToMenu() {
      location.reload();
    }

    function startGame() {
      document.getElementById('menuScreen').style.display = 'none';
      document.getElementById('gameContainer').style.display = 'flex';
      updateMenuText();
      gameLoop();
    }

    // ============ ГРОВОЙ КОД ============

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    let isGameOver = false;
    let gameStartTime = Date.now();
    let killCount = 0;

    // 🔊 ПРОСТАЯ ЗВУКОВА СИСТЕМА
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(frequency, duration, type = 'sine') {
      try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.frequency.value = frequency;
        osc.type = type;
        
        gain.gain.setValueAtTime(0.3, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
        
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + duration);
      } catch(e) {
        console.log('Sound disabled');
      }
    }

    // Звуки гри
    const sounds = {
      shoot: () => playSound(400, 0.1, 'square'),
      hit: () => playSound(800, 0.05, 'sine'),
      enemyDeath: () => playSound(200, 0.2, 'square'),
      explode: () => playSound(100, 0.3, 'triangle'),
      playerHit: () => playSound(600, 0.15, 'sine'),
      gameOver: () => {
        playSound(300, 0.1, 'sine');
        setTimeout(() => playSound(200, 0.3, 'sine'), 100);
      }
    };

    // ✨ СИСТЕМА ЧАСТИНОК
    const particles = [];

    class Particle {
      constructor(x, y, vx, vy, color, life = 30) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.life = life;
        this.maxLife = life;
        this.size = Math.random() * 3 + 2;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2;
        this.life--;
      }

      draw(ctx) {
        const alpha = this.life / this.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    // 🌊 ВИБУХОВІ ХВИЛІ
    const shockwaves = [];

    class Shockwave {
      constructor(x, y, maxRadius = 120) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = maxRadius;
        this.opacity = 1;
      }

      update() {
        this.radius += 5;
        this.opacity = 1 - (this.radius / this.maxRadius);
      }

      draw(ctx) {
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = 'rgba(255, 100, 0, 0.8)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }

      isAlive() {
        return this.opacity > 0;
      }
    }

    // Гравець
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      size: 20,
      speed: 3,
      angle: 0,
      color: 'lime',
      hp: 100,
      maxHp: 100,
      damageFlash: 0
    };

    // Вороги і кулі
    const enemies = [];
    const enemyBullets = [];
    const bullets = [];

    // Стіни
    const walls = [
      { x: 50,  y: 50,  width: 700, height: 20 },
      { x: 50,  y: 530, width: 700, height: 20 },
      { x: 50,  y: 70,  width: 20,  height: 460 },
      { x: 730, y: 70,  width: 20,  height: 460 },
      { x: 250, y: 200, width: 300, height: 20 },
      { x: 250, y: 380, width: 300, height: 20 },
      { x: 200, y: 250, width: 20,  height: 100 },
      { x: 580, y: 250, width: 20,  height: 100 }
    ];

    function isCollidingWithWall(x, y, size) {
      for (const w of walls) {
        if (
          x + size / 2 > w.x &&
          x - size / 2 < w.x + w.width &&
          y + size / 2 > w.y &&
          y - size / 2 < w.y + w.height
        ) {
          return true;
        }
      }
      return false;
    }

    const keys = { w: false, a: false, s: false, d: false };

    window.addEventListener('keydown', (e) => {
      const code = e.code;
      if (code === 'KeyW') keys.w = true;
      if (code === 'KeyA') keys.a = true;
      if (code === 'KeyS') keys.s = true;
      if (code === 'KeyD') keys.d = true;
    });

    window.addEventListener('keyup', (e) => {
      const code = e.code;
      if (code === 'KeyW') keys.w = false;
      if (code === 'KeyA') keys.a = false;
      if (code === 'KeyS') keys.s = false;
      if (code === 'KeyD') keys.d = false;
    });

    const mouse = { x: 0, y: 0 };

    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;

      const dx = mouse.x - player.x;
      const dy = mouse.y - player.y;
      player.angle = Math.atan2(dy, dx);
    });

    canvas.addEventListener('mousedown', () => {
      shoot();
    });

    function shoot() {
      if (isGameOver) return;

      sounds.shoot();

      const bulletSpeed = 6;
      bullets.push({
        x: player.x,
        y: player.y,
        size: 5,
        dx: Math.cos(player.angle) * bulletSpeed,
        dy: Math.sin(player.angle) * bulletSpeed,
        color: 'yellow'
      });

      for (let i = 0; i < 5; i++) {
        const angle = player.angle + (Math.random() - 0.5) * 0.5;
        const speed = Math.random() * 3 + 1;
        particles.push(new Particle(
          player.x + Math.cos(player.angle) * 15,
          player.y + Math.sin(player.angle) * 15,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          'rgba(255, 255, 0, 0.8)',
          20
        ));
      }
    }

    function spawnEnemy() {
      const type = Math.floor(Math.random() * 5);
      let enemy;

      if (type === 0) {
        enemy = {
          type: 'fast',
          size: 20,
          speed: 3,
          hp: 3,
          color: 'orange',
          alive: true
        };
      } else if (type === 1) {
        enemy = {
          type: 'tank',
          size: 40,
          speed: 0.7,
          hp: 15,
          color: 'purple',
          alive: true
        };
      } else if (type === 2) {
        enemy = {
          type: 'shooter',
          size: 25,
          speed: 1.2,
          hp: 6,
          color: 'cyan',
          alive: true,
          shootCooldown: 0
        };
      } else if (type === 3) {
        enemy = {
          type: 'normal',
          size: 30,
          speed: 1.8,
          hp: 8,
          color: 'red',
          alive: true
        };
      } else {
        enemy = {
          type: 'exploder',
          size: 25,
          speed: 2.2,
          hp: 4,
          color: 'rgb(255,50,50)',
          alive: true,
          exploding: false,
          explodeTimer: 0,
          blink: 0
        };
      }

      const side = Math.floor(Math.random() * 4);
      if (side === 0) {
        enemy.x = 100 + Math.random() * 600;
        enemy.y = 90;
      } else if (side === 1) {
        enemy.x = 100 + Math.random() * 600;
        enemy.y = 510;
      } else if (side === 2) {
        enemy.x = 90;
        enemy.y = 100 + Math.random() * 400;
      } else {
        enemy.x = 710;
        enemy.y = 100 + Math.random() * 400;
      }

      if (isCollidingWithWall(enemy.x, enemy.y, enemy.size)) {
        enemy.y += 30;
      }

      enemies.push(enemy);
    }

    setInterval(() => {
      if (!isGameOver) spawnEnemy();
    }, 2000);

    function updatePlayer() {
      if (isGameOver) return;

      let moveX = 0;
      let moveY = 0;

      if (keys.w) moveY -= 1;
      if (keys.s) moveY += 1;
      if (keys.a) moveX -= 1;
      if (keys.d) moveX += 1;

      if (moveX !== 0 || moveY !== 0) {
        const len = Math.sqrt(moveX * moveX + moveY * moveY);
        moveX /= len;
        moveY /= len;

        particles.push(new Particle(
          player.x + (Math.random() - 0.5) * 10,
          player.y + (Math.random() - 0.5) * 10,
          (Math.random() - 0.5) * 2,
          (Math.random() - 0.5) * 2,
          'rgba(0, 255, 0, 0.3)',
          15
        ));
      }

      let newX = player.x + moveX * player.speed;
      let newY = player.y + moveY * player.speed;

      if (!isCollidingWithWall(newX, player.y, player.size)) {
        player.x = newX;
      }
      if (!isCollidingWithWall(player.x, newY, player.size)) {
        player.y = newY;
      }

      player.damageFlash = Math.max(0, player.damageFlash - 1);
    }

    function updateEnemies() {
      if (isGameOver) return;

      for (const enemy of enemies) {
        if (!enemy.alive) continue;

        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        if (enemy.type !== 'shooter' && enemy.type !== 'exploder') {
          let newX = enemy.x + (dx / dist) * enemy.speed;
          let newY = enemy.y + (dy / dist) * enemy.speed;

          if (!isCollidingWithWall(newX, enemy.y, enemy.size)) {
            enemy.x = newX;
          }
          if (!isCollidingWithWall(enemy.x, newY, enemy.size)) {
            enemy.y = newY;
          }
        }

        if (enemy.type === 'shooter') {
          const dirX = dx / dist;
          const dirY = dy / dist;

          let newX, newY;

          if (dist < 200) {
            newX = enemy.x - dirX * enemy.speed;
            newY = enemy.y - dirY * enemy.speed;
          } else {
            newX = enemy.x + dirX * enemy.speed;
            newY = enemy.y + dirY * enemy.speed;
          }

          if (!isCollidingWithWall(newX, enemy.y, enemy.size)) enemy.x = newX;
          if (!isCollidingWithWall(enemy.x, newY, enemy.size)) enemy.y = newY;

          enemy.shootCooldown--;
          if (enemy.shootCooldown <= 0) {
            shootEnemyBullet(enemy);
            enemy.shootCooldown = 60;
          }
        }

        if (enemy.type === 'exploder') {
          const dirX = dx / dist;
          const dirY = dy / dist;

          let newX = enemy.x + dirX * enemy.speed;
          let newY = enemy.y + dirY * enemy.speed;

          if (!isCollidingWithWall(newX, enemy.y, enemy.size)) enemy.x = newX;
          if (!isCollidingWithWall(enemy.x, newY, enemy.size)) enemy.y = newY;

          if (dist < 60 && !enemy.exploding) {
            enemy.exploding = true;
            enemy.explodeTimer = 30;
          }

          if (enemy.exploding) {
            enemy.blink++;

            if (enemy.blink % 6 < 3) {
              enemy.color = 'white';
            } else {
              enemy.color = 'rgb(255,50,50)';
            }

            enemy.explodeTimer--;

            if (enemy.explodeTimer <= 0) {
              explode(enemy);
              enemy.alive = false;
              continue;
            }
          }
        }

        if (!enemy.alive || (enemy.type === 'exploder' && enemy.exploding)) {
          continue;
        }

        const minDist = (player.size + enemy.size) / 2;
        if (dist < minDist) {
          const dmg = enemy.type === 'tank' ? 2 : 1;
          player.hp -= dmg;
          player.damageFlash = 10;
          sounds.playerHit();

          if (player.hp <= 0 && !isGameOver) {
            player.hp = 0;
            gameOver();
            return;
          }
        }
      }
    }

    function explode(enemy) {
      const dx = player.x - enemy.x;
      const dy = player.y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const explodeRadius = 80;

      sounds.explode();

      shockwaves.push(new Shockwave(enemy.x, enemy.y, explodeRadius));

      for (let i = 0; i < 20; i++) {
        const angle = (Math.PI * 2 * i) / 20;
        const speed = Math.random() * 4 + 2;
        particles.push(new Particle(
          enemy.x,
          enemy.y,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          i % 2 === 0 ? 'rgba(255, 100, 0, 0.8)' : 'rgba(255, 50, 0, 0.8)',
          40
        ));
      }

      if (dist < explodeRadius) {
        player.hp -= 20;
        player.damageFlash = 15;
        sounds.playerHit();

        for (let i = 0; i < 10; i++) {
          const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x) + (Math.random() - 0.5) * 1;
          const speed = Math.random() * 3 + 1;
          particles.push(new Particle(
            player.x,
            player.y,
            Math.cos(angle) * speed,
            Math.sin(angle) * speed,
            'rgba(255, 0, 0, 0.8)',
            25
          ));
        }

        if (player.hp <= 0 && !isGameOver) {
          player.hp = 0;
          gameOver();
        }
      }
    }

    function updateBullets() {
      if (isGameOver) return;

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];

        b.x += b.dx;
        b.y += b.dy;

        if (
          b.x < 0 || b.x > canvas.width ||
          b.y < 0 || b.y > canvas.height
        ) {
          bullets.splice(i, 1);
          continue;
        }

        let hitWall = false;
        for (const w of walls) {
          if (
            b.x > w.x &&
            b.x < w.x + w.width &&
            b.y > w.y &&
            b.y < w.y + w.height
          ) {
            particles.push(new Particle(
              b.x + (Math.random() - 0.5) * 10,
              b.y + (Math.random() - 0.5) * 10,
              (Math.random() - 0.5) * 3,
              (Math.random() - 0.5) * 3,
              'rgba(255, 255, 100, 0.6)',
              15
            ));

            bullets.splice(i, 1);
            hitWall = true;
            break;
          }
        }
        if (hitWall) continue;

        for (const enemy of enemies) {
          if (!enemy.alive) continue;

          const dx = enemy.x - b.x;
          const dy = enemy.y - b.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const hitDist = (enemy.size / 2) + b.size;

          if (dist < hitDist) {
            enemy.hp -= 1;
            sounds.hit();

            for (let j = 0; j < 8; j++) {
              const angle = (Math.PI * 2 * j) / 8 + (Math.random() - 0.5) * 0.5;
              const speed = Math.random() * 2 + 1;
              particles.push(new Particle(
                b.x,
                b.y,
                Math.cos(angle) * speed,
                Math.sin(angle) * speed,
                'rgba(255, 255, 200, 0.9)',
                20
              ));
            }

            bullets.splice(i, 1);

            if (enemy.hp <= 0) {
              enemy.alive = false;
              killCount++;
              sounds.enemyDeath();

              for (let j = 0; j < 15; j++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                const color = enemy.color === 'purple' ? 'rgba(200, 100, 255, 0.8)' : 'rgba(255, 100, 100, 0.8)';
                particles.push(new Particle(
                  enemy.x,
                  enemy.y,
                  Math.cos(angle) * speed,
                  Math.sin(angle) * speed,
                  color,
                  35
                ));
              }
            }

            break;
          }
        }
      }
    }

    function shootEnemyBullet(enemy) {
      const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);

      enemyBullets.push({
        x: enemy.x,
        y: enemy.y,
        dx: Math.cos(angle) * 4,
        dy: Math.sin(angle) * 4,
        size: 5,
        color: 'red'
      });
    }

    function updateEnemyBullets() {
      if (isGameOver) return;

      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];

        b.x += b.dx;
        b.y += b.dy;

        if (
          b.x < 0 || b.x > canvas.width ||
          b.y < 0 || b.y > canvas.height
        ) {
          enemyBullets.splice(i, 1);
          continue;
        }

        let hitWall = false;
        for (const w of walls) {
          if (
            b.x > w.x &&
            b.x < w.x + w.width &&
            b.y > w.y &&
            b.y < w.y + w.height
          ) {
            enemyBullets.splice(i, 1);
            hitWall = true;
            break;
          }
        }
        if (hitWall) continue;

        const dx = player.x - b.x;
        const dy = player.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < player.size) {
          player.hp -= 5;
          player.damageFlash = 15;
          sounds.playerHit();

          for (let j = 0; j < 6; j++) {
            const angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 1;
            const speed = Math.random() * 2 + 1;
            particles.push(new Particle(
              player.x,
              player.y,
              Math.cos(angle) * speed,
              Math.sin(angle) * speed,
              'rgba(255, 0, 0, 0.8)',
              20
            ));
          }

          if (player.hp <= 0 && !isGameOver) {
            player.hp = 0;
            gameOver();
          }

          enemyBullets.splice(i, 1);
        }
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        if (particles[i].life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function updateShockwaves() {
      for (let i = shockwaves.length - 1; i >= 0; i--) {
        shockwaves[i].update();
        if (!shockwaves[i].isAlive()) {
          shockwaves.splice(i, 1);
        }
      }
    }

    function drawHUD() {
      const barWidth = 200;
      const barHeight = 20;

      ctx.fillStyle = 'darkred';
      ctx.fillRect(10, 10, barWidth, barHeight);

      const hpWidth = (player.hp / player.maxHp) * barWidth;
      ctx.fillStyle = 'lime';
      ctx.fillRect(10, 10, hpWidth, barHeight);

      ctx.fillStyle = 'white';
      ctx.font = '16px Arial';
      ctx.fillText(`HP: ${Math.floor(player.hp)} / ${player.maxHp}`, 15, 25);

      // Таймер
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      ctx.fillText(`Time: ${elapsed}s`, canvas.width - 150, 25);
      ctx.fillText(`Kills: ${killCount}`, canvas.width - 150, 50);
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.angle);

      if (player.damageFlash > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${player.damageFlash / 15})`;
        ctx.fillRect(-player.size / 2 - 3, -player.size / 2 - 3, player.size + 6, player.size + 6);
      }

      ctx.fillStyle = player.color;
      ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);

      ctx.fillStyle = 'white';
      ctx.fillRect(player.size / 2, -3, 10, 6);

      ctx.restore();
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        if (!enemy.alive) continue;

        ctx.fillStyle = enemy.color;
        ctx.fillRect(
          enemy.x - enemy.size / 2,
          enemy.y - enemy.size / 2,
          enemy.size,
          enemy.size
        );

        let maxHp =
          enemy.type === 'tank' ? 15 :
          enemy.type === 'fast' ? 3 :
          enemy.type === 'shooter' ? 6 :
          enemy.type === 'exploder' ? 4 :
          8;

        ctx.fillStyle = 'darkred';
        ctx.fillRect(
          enemy.x - enemy.size / 2,
          enemy.y - enemy.size,
          enemy.size,
          5
        );

        ctx.fillStyle = 'lime';
        ctx.fillRect(
          enemy.x - enemy.size / 2,
          enemy.y - enemy.size,
          (enemy.hp / maxHp) * enemy.size,
          5
        );
      }
    }

    function drawBullets() {
      for (const b of bullets) {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawEnemyBullets() {
      for (const b of enemyBullets) {
        ctx.fillStyle = b.color;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawWalls() {
      ctx.fillStyle = '#444';
      for (const w of walls) {
        ctx.fillRect(w.x, w.y, w.width, w.height);
      }
    }

    function drawEffects() {
      for (const sw of shockwaves) {
        sw.draw(ctx);
      }

      for (const p of particles) {
        p.draw(ctx);
      }
    }

    function gameOver() {
      isGameOver = true;
      sounds.gameOver();

      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      const score = { time: elapsed, kills: killCount };
      const scores = JSON.parse(localStorage.getItem('doomArenaScores')) || [];
      scores.push(score);
      scores.sort((a, b) => b.time - a.time);
      localStorage.setItem('doomArenaScores', JSON.stringify(scores.slice(0, 10)));

      setTimeout(() => {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = 'red';
        ctx.font = '48px Arial';
        ctx.fillText('ТИ ЗАГИНУВ', canvas.width / 2 - 150, canvas.height / 2 - 20);

        ctx.fillStyle = 'white';
        ctx.font = '24px Arial';
        ctx.fillText(`Time: ${elapsed}s | Kills: ${killCount}`, canvas.width / 2 - 140, canvas.height / 2 + 40);
      }, 50);
    }

    function gameLoop() {
      updatePlayer();
      updateEnemies();
      updateBullets();
      updateEnemyBullets();
      updateParticles();
      updateShockwaves();

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawWalls();
      drawPlayer();
      drawEnemies();
      drawBullets();
      drawEnemyBullets();
      drawEffects();
      drawHUD();

      if (!isGameOver) {
        requestAnimationFrame(gameLoop);
      }
    }

    updateMenuText();
  </script>
</body>
</html>
